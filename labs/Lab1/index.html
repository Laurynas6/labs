<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Lab 1. Introduction to HTML5 and HLS</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>
<body>

<h1>My first HLS player</h1>

<video id="video" width="640" height="360" controls></video>

<br><br>

<button onclick="playVideo()">Play</button>
<button onclick="pauseVideo()">Pause</button>
<button onclick="stopVideo()">Stop</button>
<button onclick="forward()">Jump to 5 sec forward</button>
<button onclick="backward()">Jump to 5 sec backwards</button>

<p>Playlist</p>

<input id="url1" size="100"
value="https://d2zihajmogu5jn.cloudfront.net/bipbop-advanced/bipbop_16x9_variant.m3u8">
<button onclick="loadUrl('url1')">Load</button><br>

<input id="url2" size="100"
value="https://video-dev.github.io/streams/x36xhzz/x36xhzz.m3u8">
<button onclick="loadUrl('url2')">Load</button><br>

<button onclick="shuffle()">Shuffle</button>

<script>

var video = document.getElementById('video');
var hls = new Hls();

function loadStream(url){
    if(Hls.isSupported()){
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

loadStream(document.getElementById("url1").value);

function playVideo(){ video.play(); }
function pauseVideo(){ video.pause(); }

function stopVideo(){
    video.pause();
    video.currentTime = 0;
}

function forward(){
    video.currentTime += 5;
}

function backward(){
    video.currentTime -= 5;
}

function loadUrl(id){
    loadStream(document.getElementById(id).value);
}

function shuffle(){
    if(Math.random() > 0.5)
        loadUrl("url1");
    else
        loadUrl("url2");
}

</script>

</body>
</html>
